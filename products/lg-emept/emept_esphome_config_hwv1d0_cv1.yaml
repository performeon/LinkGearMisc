substitutions:
  device_name: lg-emess-pt1
  friendly_name: LinkGear EMESS-PT
  project_name: LinkGear.EMESS-PT
  project_version: "1.0.1"
  hw_version: "hwv1d0"
  config_version: "cv2"

esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"
  name_add_mac_suffix: true
  project:
    name: "${project_name}"
    version: "${project_version}"
  comment: "${hw_version}_${config_version}"
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: emept_status_leds
          red: 0%
          green: 100%
          blue: 0%
          brightness: 40%
      - delay: 700ms
      - light.turn_off: emept_status_leds
      - script.execute: emept_update_status_leds_from_temperature

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  actions:
  - action: play_buzzer
    variables:
      song_str: string
    then:
    - rtttl.play:
        rtttl: !lambda 'return song_str;'
  reboot_timeout: 0s

web_server:
  port: 80
  version: 3
  ota: false

# Enable Over The Air updates
ota:
  - platform: esphome
    id: emept_esphome_ota
  - platform: http_request
    id: emept_http_request_ota

http_request:
  id: emept_http_request
  timeout: 10s

update:
  - platform: http_request
    id: emept_firmware_update
    name: "Firmware Update"
    source: https://raw.githubusercontent.com/performeon/LinkGearMisc/main/products/lg-emept/emept_esphome_config_hwv1d0_cv1.manifest.json

#Public location of this yaml file
dashboard_import:
  package_import_url: 
    github://performeon/LinkGearMisc/products/lg-emept/emept_esphome_config_hwv1d0_cv1.yaml@main
  import_full_config: true

# Enable fallback hotspot (captive portal) in case wifi connection fails
captive_portal:

improv_serial:

esp32_improv:
  authorizer: none

wifi:
  ap:
    ssid: "${friendly_name}"


# =====================================================
# PT100/PT1000 SENSOR DEFINITIONS
# =====================================================
sensor:
  # -------------------------------------------------
  # CHANNEL 1 – PT100 (DEFAULT)
  # -------------------------------------------------
  - platform: max31865
    id: emept_pt_channel_1_raw
    name: "PT Channel 1"
    icon: mdi:thermometer
    spi_id: emept_spi_bus
    cs_pin:
      number: GPIO5
      ignore_strapping_warning: true

    # --- DEFAULT (PT1000, 2-WIRE) ---
    rtd_nominal_resistance: 100.0
    reference_resistance: 400.0
    #rtd_wires: 2

    # --- EXAMPLE PT1000 3-WIRE ---
    rtd_wires: 3

    # --- EXAMPLE PT1000 4-WIRE ---
    # rtd_wires: 4

    update_interval: 5s
    accuracy_decimals: 2

    filters:
      - lambda: |-
          if (!id(emept_ch1_enabled)) return NAN;
          if (isnan(x)) return NAN;
          const float t = x + id(emept_pt_channel_1_offset_c).state;
          if (t < -80.0f || t > 400.0f) return NAN;
          return t;
    on_value:
      then:
        - script.execute: emept_update_status_leds_from_temperature
        - script.execute: emept_check_temperature_alarm

  # -------------------------------------------------
  # CHANNEL 2 – PT1000 (DEFAULT)
  # -------------------------------------------------
  - platform: max31865
    id: emept_pt_channel_2_raw
    name: "PT Channel 2"
    icon: mdi:thermometer
    spi_id: emept_spi_bus
    cs_pin: GPIO4

    # --- DEFAULT (PT100, 2-WIRE) ---
    rtd_nominal_resistance: 1000.0
    reference_resistance: 4000.0
    rtd_wires: 2

    update_interval: 5s
    accuracy_decimals: 2

    filters:
      - lambda: |-
          if (!id(emept_ch2_enabled)) return NAN;
          if (isnan(x)) return NAN;
          const float t = x + id(emept_pt_channel_2_offset_c).state;
          if (t < -80.0f || t > 400.0f) return NAN;
          return t;
    on_value:
      then:
        - script.execute: emept_update_status_leds_from_temperature
        - script.execute: emept_check_temperature_alarm

  # -------------------------------------------------
  # MISC DEBUG SENSORS
  # -------------------------------------------------

  - platform: uptime
    id: emept_sys_uptime
    name: "Uptime"
    icon: mdi:timer-outline
    unit_of_measurement: h
    accuracy_decimals: 2
    update_interval: 60s
    entity_category: diagnostic
    filters:
      - lambda: return x / 3600.0;

  - platform: wifi_signal
    id: emept_wifi_signal_db
    name: "WiFi Signal"
    icon: mdi:wifi
    update_interval: 30s
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      id: emept_wifi_ip_address
      name: "IP Address"
      icon: mdi:ip-network
      entity_category: diagnostic
    ssid:
      id: emept_wifi_ssid
      name: "WiFi SSID"
      icon: mdi:wifi-settings
      entity_category: diagnostic

binary_sensor:
  - platform: template
    id: emept_pt_sensors_status
    name: "PT Sensors Status"
    icon: mdi:alert-circle-outline
    device_class: problem
    entity_category: diagnostic
    lambda: |-
      const bool ch1_ok = !id(emept_ch1_enabled) || !isnan(id(emept_pt_channel_1_raw).state);
      const bool ch2_ok = !id(emept_ch2_enabled) || !isnan(id(emept_pt_channel_2_raw).state);
      return !(ch1_ok && ch2_ok);

# =====================================================
# ENABLE / DISABLE SWITCHES
# =====================================================
switch:
  - platform: template
    id: emept_enable_channel_1
    name: "Enable Channel 1"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: id(emept_ch1_enabled) = true;
      - script.execute: emept_update_status_leds_from_temperature
    turn_off_action:
      - lambda: id(emept_ch1_enabled) = false;
      - script.execute: emept_update_status_leds_from_temperature
    optimistic: true

  - platform: template
    id: emept_enable_channel_2
    name: "Enable Channel 2"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: id(emept_ch2_enabled) = true;
      - script.execute: emept_update_status_leds_from_temperature
    turn_off_action:
      - lambda: id(emept_ch2_enabled) = false;
      - script.execute: emept_update_status_leds_from_temperature
    optimistic: true

  - platform: template
    name: "Alarm Outside Temperature Range"
    id: emept_alarm_outside_temp_range
    icon: mdi:alarm-light-outline
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true

# =====================================================
# DEVICE CONTROL BUTTONS
# =====================================================
button:
  - platform: restart
    id: emept_restart_esp
    icon: mdi:power-cycle
    name: "ESP Reboot"

  - platform: factory_reset
    disabled_by_default: True
    name: "Factory Reset ESP"
    id: emept_factory_reset_all


# =====================================================
# SPI BUS
# =====================================================
spi:
  id: emept_spi_bus
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# =====================================================
# GLOBAL ENABLE FLAGS (prevents error spam)
# =====================================================
globals:
  - id: emept_ch1_enabled
    type: bool
    restore_value: true
    initial_value: "true"

  - id: emept_ch2_enabled
    type: bool
    restore_value: true
    initial_value: "true"

  - id: emept_last_alarm_buzz_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

# =====================================================
# LED / CALIBRATION / ALARM SETTINGS
# =====================================================
number:
  - platform: template
    id: emept_pt_channel_1_offset_c
    name: "PT Channel 1 Offset °C"
    icon: mdi:tune-variant
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: -20
    max_value: 20
    step: 0.1
    initial_value: 0

  - platform: template
    id: emept_pt_channel_2_offset_c
    name: "PT Channel 2 Offset °C"
    icon: mdi:tune-variant
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: -20
    max_value: 20
    step: 0.1
    initial_value: 0

  - platform: template
    id: emept_alarm_temp_min_c
    name: "Alarm Min Temperature °C"
    icon: mdi:thermometer-low
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: -50
    max_value: 200
    step: 0.5
    initial_value: -10
    set_action:
      - script.execute: emept_check_temperature_alarm

  - platform: template
    id: emept_alarm_temp_max_c
    name: "Alarm Max Temperature °C"
    icon: mdi:thermometer-high
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: -50
    max_value: 300
    step: 0.5
    initial_value: 120
    set_action:
      - script.execute: emept_check_temperature_alarm

  - platform: template
    id: emept_led_color_min_c
    name: "LED Color Min °C"
    icon: mdi:thermometer-low
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: -20
    max_value: 200
    step: 1
    initial_value: 0
    set_action:
      - script.execute: emept_update_status_leds_from_temperature

  - platform: template
    id: emept_led_color_max_c
    name: "LED Color Max °C"
    icon: mdi:thermometer-high
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: -20
    max_value: 200
    step: 1
    initial_value: 80
    set_action:
      - script.execute: emept_update_status_leds_from_temperature

  - platform: template
    id: emept_led_brightness_pct
    name: "LED Brightness %"
    icon: mdi:brightness-6
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 45
    set_action:
      - script.execute: emept_update_status_leds_from_temperature

# =====================================================
# BUZZER
# =====================================================
output:
  - platform: ledc
    id: emept_buzzer_output
    pin: GPIO25

rtttl:
  output: emept_buzzer_output
  gain: 90%
  id: emept_buzzer


# =====================================================
# COLOR TEMPERATURE SCRIPT
# =====================================================
script:
  - id: emept_check_temperature_alarm
    then:
      - lambda: |-
          if (!id(emept_alarm_outside_temp_range).state) return;

          const float min_t = id(emept_alarm_temp_min_c).state;
          const float max_t = id(emept_alarm_temp_max_c).state;
          bool out_of_range = false;

          if (id(emept_ch1_enabled) && !isnan(id(emept_pt_channel_1_raw).state)) {
            const float t1 = id(emept_pt_channel_1_raw).state;
            if (t1 < min_t || t1 > max_t) out_of_range = true;
          }

          if (id(emept_ch2_enabled) && !isnan(id(emept_pt_channel_2_raw).state)) {
            const float t2 = id(emept_pt_channel_2_raw).state;
            if (t2 < min_t || t2 > max_t) out_of_range = true;
          }

          if (!out_of_range) return;

          const uint32_t now_ms = millis();
          if ((now_ms - id(emept_last_alarm_buzz_ms)) < 15000) return;
          id(emept_last_alarm_buzz_ms) = now_ms;
          id(emept_buzzer).play("alarm:d=8,o=5,b=100:e,e,e,p,e,e,e");

  - id: emept_update_status_leds_from_temperature
    then:
      - if:
          condition:
            lambda: "return !id(emept_ch2_enabled);"
          then:
            - light.turn_off: emept_status_leds_ch2
          else:
            - if:
                condition:
                  lambda: "return isnan(id(emept_pt_channel_2_raw).state);"
                then:
                  - light.turn_on:
                      id: emept_status_leds_ch2
                      red: 100%
                      green: 0%
                      blue: 0%
                      brightness: !lambda "return id(emept_led_brightness_pct).state / 100.0f;"
                      effect: "Error Pulse"
                else:
                  - light.turn_on:
                      id: emept_status_leds_ch2
                      red: !lambda |-
                        float t = id(emept_pt_channel_2_raw).state;
                        float min_t = id(emept_led_color_min_c).state;
                        float max_t = id(emept_led_color_max_c).state;
                        float low = min_t < max_t ? min_t : max_t;
                        float high = min_t < max_t ? max_t : min_t;
                        float range = high - low;
                        if (range < 0.001f) return 0.0f;
                        if (t < low) t = low;
                        if (t > high) t = high;
                        return (t - low) / range;
                      green: 0%
                      blue: !lambda |-
                        float t = id(emept_pt_channel_2_raw).state;
                        float min_t = id(emept_led_color_min_c).state;
                        float max_t = id(emept_led_color_max_c).state;
                        float low = min_t < max_t ? min_t : max_t;
                        float high = min_t < max_t ? max_t : min_t;
                        float range = high - low;
                        if (range < 0.001f) return 1.0f;
                        if (t < low) t = low;
                        if (t > high) t = high;
                        return 1.0f - ((t - low) / range);
                      brightness: !lambda "return id(emept_led_brightness_pct).state / 100.0f;"
                      effect: "None"
      - if:
          condition:
            lambda: "return !id(emept_ch1_enabled);"
          then:
            - light.turn_off: emept_status_leds_ch1
          else:
            - if:
                condition:
                  lambda: "return isnan(id(emept_pt_channel_1_raw).state);"
                then:
                  - light.turn_on:
                      id: emept_status_leds_ch1
                      red: 100%
                      green: 0%
                      blue: 0%
                      brightness: !lambda "return id(emept_led_brightness_pct).state / 100.0f;"
                      effect: "Error Pulse"
                else:
                  - light.turn_on:
                      id: emept_status_leds_ch1
                      red: !lambda |-
                        float t = id(emept_pt_channel_1_raw).state;
                        float min_t = id(emept_led_color_min_c).state;
                        float max_t = id(emept_led_color_max_c).state;
                        float low = min_t < max_t ? min_t : max_t;
                        float high = min_t < max_t ? max_t : min_t;
                        float range = high - low;
                        if (range < 0.001f) return 0.0f;
                        if (t < low) t = low;
                        if (t > high) t = high;
                        return (t - low) / range;
                      green: 0%
                      blue: !lambda |-
                        float t = id(emept_pt_channel_1_raw).state;
                        float min_t = id(emept_led_color_min_c).state;
                        float max_t = id(emept_led_color_max_c).state;
                        float low = min_t < max_t ? min_t : max_t;
                        float high = min_t < max_t ? max_t : min_t;
                        float range = high - low;
                        if (range < 0.001f) return 1.0f;
                        if (t < low) t = low;
                        if (t > high) t = high;
                        return 1.0f - ((t - low) / range);
                      brightness: !lambda "return id(emept_led_brightness_pct).state / 100.0f;"
                      effect: "None"


# =====================================================
# STATUS LEDs (6x WS2812)
# =====================================================
light:
  - platform: esp32_rmt_led_strip
    id: emept_status_leds
    name: "Status LEDs"
    internal: true
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO17
    num_leds: 6
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: partition
    id: emept_status_leds_ch1
    segments:
      - id: emept_status_leds
        from: 0
        to: 2
    restore_mode: ALWAYS_ON
    effects:
      - pulse:
          name: "Error Pulse"
          transition_length: 500ms
          update_interval: 500ms
  - platform: partition
    id: emept_status_leds_ch2
    segments:
      - id: emept_status_leds
        from: 3
        to: 5
    restore_mode: ALWAYS_ON
    effects:
      - pulse:
          name: "Error Pulse"
          transition_length: 500ms
          update_interval: 500ms
